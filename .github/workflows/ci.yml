name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint clinic app
        run: npm run lint -w @medassist/clinic
        continue-on-error: true

      - name: Type check clinic app
        run: npm run type-check -w @medassist/clinic

      - name: Lint patient app
        run: npm run lint -w @medassist/patient
        continue-on-error: true

      - name: Type check patient app
        run: npm run type-check -w @medassist/patient

  build:
    name: Build Clinic App
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NATIONAL_ID_SALT: ${{ secrets.NATIONAL_ID_SALT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build clinic app
        run: npm run build:clinic

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-build
          path: apps/clinic/.next
          retention-days: 7

  build-patient:
    name: Build Patient App
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NATIONAL_ID_SALT: ${{ secrets.NATIONAL_ID_SALT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build patient app
        run: npm run build:patient

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: patient-build
          path: apps/patient/.next
          retention-days: 7
