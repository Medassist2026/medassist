name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check (root — full monorepo)
        # D-045: catches phantom imports inside packages/shared/** that the
        # per-workspace checks miss (workspace tsconfigs only see apps/<app>/**).
        # Required check — no continue-on-error.
        run: npm run type-check

      - name: Lint clinic app
        run: npm run lint -w @medassist/clinic
        continue-on-error: true

      - name: Type check clinic app
        run: npm run type-check -w @medassist/clinic

      - name: Lint patient app
        run: npm run lint -w @medassist/patient
        continue-on-error: true

      - name: Type check patient app
        run: npm run type-check -w @medassist/patient

  build:
    name: Build Clinic App
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NATIONAL_ID_SALT: ${{ secrets.NATIONAL_ID_SALT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build clinic app
        run: |
          set -o pipefail
          npm run build:clinic 2>&1 | tee /tmp/clinic-build.log

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-build
          path: apps/clinic/.next
          retention-days: 7

      - name: Upload clinic build log
        # Always upload — admin scope is required for raw job logs, but
        # artifacts are downloadable by anyone with read access. See CI run
        # 25475031898 — opaque "Process completed with exit code 1." was the
        # only externally visible signal.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clinic-build-log
          path: /tmp/clinic-build.log
          retention-days: 7

  build-patient:
    name: Build Patient App
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NATIONAL_ID_SALT: ${{ secrets.NATIONAL_ID_SALT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build patient app
        run: |
          set -o pipefail
          npm run build:patient 2>&1 | tee /tmp/patient-build.log

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: patient-build
          path: apps/patient/.next
          retention-days: 7

      - name: Upload patient build log
        # Always upload — same rationale as the clinic log step above.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patient-build-log
          path: /tmp/patient-build.log
          retention-days: 7
